<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#000000"/>

  <!-- Glow -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>

  <!-- Vault Ring -->
  <circle cx="256" cy="256" r="120"
          stroke="#8b5cf6"
          stroke-width="12"
          fill="none"/>

  <!-- Waveform -->
  <rect x="220" width="16" fill="#ffffff" rx="4">
    <animate attributeName="y" values="240;220;240" dur="1s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="height" values="40;80;40" dur="1s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <rect x="248" width="16" fill="#ffffff" rx="4">
    <animate attributeName="y" values="220;240;220" dur="1s" begin="0.15s" repeatCount="indefinite"/>
    <animate attributeName="height" values="80;40;80" dur="1s" begin="0.15s" repeatCount="indefinite"/>
  </rect>
  <rect x="276" width="16" fill="#ffffff" rx="4">
    <animate attributeName="y" values="235;215;235" dur="1s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="height" values="50;90;50" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
</svg>
